<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkansas Bowling</title>

<style>

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #ffffff;
}

/* NAVBAR */

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #9D2235;
    padding: 12px 40px;
}

.nav-left {
    display: flex;
    align-items: center;
}

.logo {
    height: 50px;
}

/* NAV BUTTONS */

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 30px;
    font-size: 18px;
    font-weight: bold;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* MAIN SECTION */

.hero {
    text-align: center;
    padding: 120px 20px;
    background: linear-gradient(white, #f4f4f4);
}

.hero h1 {
    font-size: 48px;
    color: #9D2235;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
    color: #444;
}

.hero button {
    margin-top: 30px;
    padding: 14px 28px;
    font-size: 18px;
    border: none;
    background-color: #9D2235;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

.hero button:hover {
    background-color: #7d1a2a;
}

</style>
</head>


<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="nav-left">
        <img src="materials/logo.png" class="logo">
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/aboutus/">About Us</a>
        <a href="/recruitment/">Recruitment</a>
    </div>

</div>


<!-- HERO SECTION -->

<section class="hero">

    <h1>Arkansas Bowling</h1>

    <p>
        Representing the University of Arkansas in collegiate bowling competition.
    </p>

    <button>Join The Team</button>

</section>


</body>
</html>
